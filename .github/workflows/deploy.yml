name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "10.23.0"
  VPS_TARGET_DIR: "/opt/synosec"
  BACKEND_PUBLIC_PORT: "3031"
  FRONTEND_PUBLIC_PORT: "3030"

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Run build
        run: pnpm build

  deploy:
    needs: test-and-build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate deploy configuration
        run: |
          set -euo pipefail

          require_var() {
            local name="$1"
            local value="$2"

            if [ -z "$value" ]; then
              echo "Missing required GitHub Actions variable: $name" >&2
              exit 1
            fi
          }

          require_var "VPS_HOST" "${{ vars.VPS_HOST }}"
          require_var "VPS_USER" "${{ vars.VPS_USER }}"
          require_var "SERVER_NAME" "${{ vars.SERVER_NAME }}"
          require_var "NGINX_CONFIG_PATH" "${{ vars.NGINX_CONFIG_PATH }}"
          require_var "FRONTEND_URL" "${{ vars.FRONTEND_URL }}"
          require_var "SSL_CERT_PATH" "${{ vars.SSL_CERT_PATH }}"
          require_var "SSL_CERT_KEY_PATH" "${{ vars.SSL_CERT_KEY_PATH }}"

      - name: Verify deploy files exist
        run: |
          test -f docker-compose.vps.yml
          test -f infra/deploy/env.vps.template
          test -f infra/nginx/synosec.vps.conf.template

      - name: Copy project to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ vars.VPS_HOST }}
          username: ${{ vars.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "."
          target: "${{ env.VPS_TARGET_DIR }}"
          strip_components: 1
          rm: false

      - name: Deploy with Docker Compose
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.VPS_HOST }}
          username: ${{ vars.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail
            mkdir -p "${{ env.VPS_TARGET_DIR }}"
            cd "${{ env.VPS_TARGET_DIR }}"
            test -f docker-compose.vps.yml
            test -f infra/deploy/env.vps.template
            test -f infra/nginx/synosec.vps.conf.template
            python3 - <<'PY'
            from pathlib import Path

            template = Path("infra/deploy/env.vps.template").read_text()
            rendered = template.replace("__FRONTEND_URL__", """${{ vars.FRONTEND_URL }}""")

            secrets = {
                "POSTGRES_PASSWORD": """${{ secrets.POSTGRES_PASSWORD }}""",
                "ANTHROPIC_API_KEY": """${{ secrets.ANTHROPIC_API_KEY }}""",
                "CONNECTOR_SHARED_TOKEN": """${{ secrets.CONNECTOR_SHARED_TOKEN }}""",
                "AUTH_SESSION_SECRET": """${{ secrets.AUTH_SESSION_SECRET }}""",
            }

            Path(".env").write_text(
                rendered.rstrip() + "\n" + "".join(f"{key}={value}\n" for key, value in secrets.items())
            )
            Path(".env").chmod(0o600)
            PY
            docker compose -f docker-compose.vps.yml up -d --build --remove-orphans
            sed \
              -e 's|__SERVER_NAME__|${{ vars.SERVER_NAME }}|g' \
              -e 's|__BACKEND_PUBLIC_PORT__|${{ env.BACKEND_PUBLIC_PORT }}|g' \
              -e 's|__FRONTEND_PUBLIC_PORT__|${{ env.FRONTEND_PUBLIC_PORT }}|g' \
              -e 's|__SSL_CERT_PATH__|${{ vars.SSL_CERT_PATH }}|g' \
              -e 's|__SSL_CERT_KEY_PATH__|${{ vars.SSL_CERT_KEY_PATH }}|g' \
              infra/nginx/synosec.vps.conf.template > /tmp/synosec-nginx.conf
            sudo /usr/bin/install -m 0644 /tmp/synosec-nginx.conf "${{ vars.NGINX_CONFIG_PATH }}"
            sudo /usr/sbin/nginx -t
            sudo /bin/systemctl reload nginx
            docker image prune -f

      - name: Purge Cloudflare cache
        run: |
          curl -fsS -X POST "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}'

      - name: Check origin health on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.VPS_HOST }}
          username: ${{ vars.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail
            curl -fsS --max-time 30 "http://127.0.0.1:${{ env.BACKEND_PUBLIC_PORT }}/api/health" >/dev/null
            curl -fsS --max-time 30 "http://127.0.0.1:${{ env.FRONTEND_PUBLIC_PORT }}/" >/dev/null
