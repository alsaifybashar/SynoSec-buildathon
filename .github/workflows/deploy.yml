name: Deploy to VPS

on:
  push:
    branches: [development]
  workflow_dispatch:

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.23.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Run build
        run: pnpm build

  deploy:
    needs: test-and-build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy project to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ vars.VPS_HOST }}
          username: ${{ vars.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "."
          target: "${{ vars.VPS_TARGET_DIR }}"
          strip_components: 1
          rm: false

      - name: Deploy with Docker Compose
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.VPS_HOST }}
          username: ${{ vars.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -eu
            mkdir -p "${{ vars.VPS_TARGET_DIR }}"
            cd "${{ vars.VPS_TARGET_DIR }}"
            cat > .env <<EOF
            BACKEND_PORT=${{ vars.BACKEND_PORT }}
            VITE_DEV_PORT=${{ vars.VITE_DEV_PORT }}
            POSTGRES_PORT=${{ vars.POSTGRES_PORT }}
            ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
            CLAUDE_MODEL=${{ vars.CLAUDE_MODEL }}
            SCAN_MAX_DEPTH=${{ vars.SCAN_MAX_DEPTH }}
            SCAN_MAX_DURATION_MINUTES=${{ vars.SCAN_MAX_DURATION_MINUTES }}
            SCAN_RATE_LIMIT_RPS=${{ vars.SCAN_RATE_LIMIT_RPS }}
            EOF
            docker compose up -d --build --remove-orphans
            docker image prune -f
