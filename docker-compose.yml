services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "${POSTGRES_PORT:-55432}:5432"
    environment:
      POSTGRES_DB: synosec
      POSTGRES_USER: synosec
      POSTGRES_PASSWORD: synosec
    volumes:
      - postgres_data:/var/lib/postgresql/data

  neo4j:
    image: neo4j:5.18-community
    container_name: synosec-neo4j
    ports:
      - "7474:7474"   # Neo4j Browser UI
      - "7687:7687"   # Bolt protocol
    environment:
      NEO4J_AUTH: neo4j/synosec-dev
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15

  # ── Intentionally vulnerable target (safe demo only) ─────────────────
  vulnerable-target:
    build:
      context: ./targets/vulnerable-app
    container_name: synosec-target
    hostname: synosec-target
    ports:
      - "8888:8888"
    environment:
      PORT: 8888

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    ports:
      - "${BACKEND_PORT:-3001}:${BACKEND_PORT:-3001}"
    volumes:
      - .:/workspace
      - backend_node_modules:/workspace/apps/backend/node_modules
      - contracts_node_modules:/workspace/packages/contracts/node_modules
      - root_node_modules:/workspace/node_modules
    working_dir: /workspace
    depends_on:
      postgres:
        condition: service_started
      neo4j:
        condition: service_healthy
      vulnerable-target:
        condition: service_started
    environment:
      BACKEND_PORT: ${BACKEND_PORT:-3001}
      DATABASE_URL: postgres://synosec:synosec@postgres:5432/synosec
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: synosec-dev
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-claude-sonnet-4-6}
      SCAN_MAX_DEPTH: ${SCAN_MAX_DEPTH:-4}
      SCAN_MAX_DURATION_MINUTES: ${SCAN_MAX_DURATION_MINUTES:-20}
      SCAN_RATE_LIMIT_RPS: ${SCAN_RATE_LIMIT_RPS:-5}
      AGENT_MAX_ITERATIONS: ${AGENT_MAX_ITERATIONS:-5}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: sh -c "pnpm install --frozen-lockfile || pnpm install && pnpm --filter @synosec/contracts build && pnpm --filter @synosec/backend prisma:generate && pnpm --filter @synosec/backend prisma:push && pnpm --filter @synosec/backend dev"

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    environment:
      VITE_API_PROXY_TARGET: http://backend:${BACKEND_PORT:-3001}
      VITE_DEV_PORT: ${VITE_DEV_PORT:-5173}
    ports:
      - "${VITE_DEV_PORT:-5173}:${VITE_DEV_PORT:-5173}"
    depends_on:
      - backend
    volumes:
      - .:/workspace
      - frontend_node_modules:/workspace/apps/frontend/node_modules
      - contracts_node_modules:/workspace/packages/contracts/node_modules
      - root_node_modules:/workspace/node_modules
    working_dir: /workspace
    command: sh -c "pnpm install --frozen-lockfile || pnpm install && pnpm --filter @synosec/contracts build && pnpm --filter @synosec/frontend dev -- --host 0.0.0.0 --port ${VITE_DEV_PORT:-5173}"

volumes:
  postgres_data:
  backend_node_modules:
  contracts_node_modules:
  frontend_node_modules:
  root_node_modules:
  neo4j_data:
  neo4j_logs:
