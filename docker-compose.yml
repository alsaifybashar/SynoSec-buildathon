services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    ports:
      - "${POSTGRES_PORT:-55432}:5432"
    environment:
      POSTGRES_DB: synosec
      POSTGRES_USER: synosec
      POSTGRES_PASSWORD: synosec
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U synosec -d synosec"]
      interval: 2s
      timeout: 5s
      retries: 30
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # ── Intentionally vulnerable target (safe demo only) ─────────────────
  vulnerable-target:
    build:
      context: ./demos/vulnerable-app
    container_name: target-broad-web
    hostname: synosec-target
    ports:
      - "8888:8888"
    environment:
      PORT: 8888

  full-stack-target:
    build:
      context: ./demos/full-stack-target
    container_name: target-finance-chain
    hostname: synosec-full-stack-target
    ports:
      - "8891:8891"
    environment:
      PORT: 8891

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    profiles:
      - local-llm
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 12

  ollama-init:
    image: ollama/ollama:latest
    container_name: ollama-init
    profiles:
      - local-llm
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: ${LLM_LOCAL_MODEL:-qwen3:8b}
    entrypoint:
      - /bin/sh
      - -c
      - ollama pull "$${OLLAMA_MODEL}"
    restart: "no"

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: backend
    ports:
      - "${BACKEND_PORT:-3001}:${BACKEND_PORT:-3001}"
    volumes:
      - .:/workspace
      - backend_node_modules:/workspace/apps/backend/node_modules
      - contracts_node_modules:/workspace/packages/contracts/node_modules
      - root_node_modules:/workspace/node_modules
    working_dir: /workspace
    depends_on:
      postgres:
        condition: service_healthy
      vulnerable-target:
        condition: service_started
      full-stack-target:
        condition: service_started
    environment:
      BACKEND_PORT: ${BACKEND_PORT:-3001}
      DATABASE_URL: postgres://synosec:synosec@postgres:5432/synosec
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      LLM_PROVIDER: ${LLM_PROVIDER:-anthropic}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-}
      LLM_ANTHROPIC_MODEL: ${LLM_ANTHROPIC_MODEL:-claude-haiku-4-5}
      LLM_LOCAL_BASE_URL: http://ollama:11434/v1
      LLM_LOCAL_MODEL: ${LLM_LOCAL_MODEL:-qwen3:8b}
      LLM_LOCAL_OPENAI_API_MODE: ${LLM_LOCAL_OPENAI_API_MODE:-chat}
      SCAN_MAX_DEPTH: ${SCAN_MAX_DEPTH:-4}
      SCAN_MAX_DURATION_MINUTES: ${SCAN_MAX_DURATION_MINUTES:-20}
      SCAN_RATE_LIMIT_RPS: ${SCAN_RATE_LIMIT_RPS:-5}
      AGENT_MAX_ITERATIONS: ${AGENT_MAX_ITERATIONS:-5}
      TOOL_EXECUTION_MODE: ${TOOL_EXECUTION_MODE:-connector}
      CONNECTOR_SHARED_TOKEN: ${CONNECTOR_SHARED_TOKEN:-synosec-connector-dev}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:' + (process.env.BACKEND_PORT || 3001) + '/api/health').then((response) => { if (!response.ok) process.exit(1); }).catch(() => process.exit(1))"
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 10s
    command: sh -c "sh ./scripts/docker/ensure-pnpm-deps.sh && pnpm --filter @synosec/contracts build && pnpm --filter @synosec/backend prisma:generate && pnpm --filter @synosec/backend dev"

  connector:
    build:
      context: .
      dockerfile: apps/connector/Dockerfile
      target: ${CONNECTOR_DOCKER_TARGET:-connector-dev-web}
    container_name: connector
    depends_on:
      backend:
        condition: service_healthy
    environment:
      CONNECTOR_CONTROL_PLANE_URL: http://backend:${BACKEND_PORT:-3001}
      CONNECTOR_SHARED_TOKEN: ${CONNECTOR_SHARED_TOKEN:-synosec-connector-dev}
      CONNECTOR_NAME: ${CONNECTOR_NAME:-local-dev-connector}
      CONNECTOR_RUN_MODE: ${CONNECTOR_RUN_MODE:-execute}
      CONNECTOR_COMMAND_TIMEOUT_MS: ${CONNECTOR_COMMAND_TIMEOUT_MS:-180000}
      CONNECTOR_ALLOWED_CAPABILITIES: ${CONNECTOR_ALLOWED_CAPABILITIES:-all}
      CONNECTOR_ALLOWED_SANDBOX_PROFILES: ${CONNECTOR_ALLOWED_SANDBOX_PROFILES:-all}
      CONNECTOR_ALLOWED_PRIVILEGE_PROFILES: ${CONNECTOR_ALLOWED_PRIVILEGE_PROFILES:-all}
    volumes:
      - .:/workspace
      - connector_node_modules:/workspace/apps/connector/node_modules
      - contracts_node_modules:/workspace/packages/contracts/node_modules
      - root_node_modules:/workspace/node_modules
    working_dir: /workspace

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: frontend
    environment:
      VITE_API_PROXY_TARGET: http://backend:${BACKEND_PORT:-3001}
      VITE_DEV_PORT: ${VITE_DEV_PORT:-5173}
    ports:
      - "${VITE_DEV_PORT:-5173}:${VITE_DEV_PORT:-5173}"
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - .:/workspace
      - frontend_node_modules:/workspace/apps/frontend/node_modules
      - contracts_node_modules:/workspace/packages/contracts/node_modules
      - root_node_modules:/workspace/node_modules
    working_dir: /workspace
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:' + (process.env.VITE_DEV_PORT || 5173)).then((response) => { if (!response.ok) process.exit(1); }).catch(() => process.exit(1))"
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 10s
    command: sh -c "sh ./scripts/docker/ensure-pnpm-deps.sh && pnpm --filter @synosec/contracts build && pnpm --filter @synosec/frontend dev -- --host 0.0.0.0 --port ${VITE_DEV_PORT:-5173}"

volumes:
  postgres_data:
  ollama_data:
  backend_node_modules:
  contracts_node_modules:
  frontend_node_modules:
  connector_node_modules:
  root_node_modules:
