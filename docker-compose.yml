services:
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    volumes:
      - .:/workspace
      - backend_node_modules:/workspace/apps/backend/node_modules
      - contracts_node_modules:/workspace/packages/contracts/node_modules
      - root_node_modules:/workspace/node_modules
    working_dir: /workspace
    environment:
      BACKEND_PORT: 3001
    command: sh -c "pnpm install --frozen-lockfile || pnpm install && pnpm --filter @synosec/contracts build && pnpm --filter @synosec/backend dev"

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    environment:
      VITE_API_PROXY_TARGET: http://backend:3001
      VITE_DEV_PORT: 5173
    ports:
      - "${VITE_DEV_PORT:-5173}:5173"
    depends_on:
      - backend
    volumes:
      - .:/workspace
      - frontend_node_modules:/workspace/apps/frontend/node_modules
      - contracts_node_modules:/workspace/packages/contracts/node_modules
      - root_node_modules:/workspace/node_modules
    working_dir: /workspace
    command: sh -c "pnpm install --frozen-lockfile || pnpm install && pnpm --filter @synosec/contracts build && pnpm --filter @synosec/frontend dev -- --host 0.0.0.0"

volumes:
  backend_node_modules:
  contracts_node_modules:
  frontend_node_modules:
  root_node_modules:

